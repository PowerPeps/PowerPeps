<!DOCTYPE html>
<html x-data="cvApp()" x-init="init()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV - Papillon Virton</title>
    <link rel="icon" href="https://avatars.githubusercontent.com/PowerPeps" type="image/png">
    <script>
        (function () {
            var params  = new URLSearchParams(window.location.search);
            var stored  = localStorage.getItem('cv-lang');
            var nav     = (navigator.language || '').toLowerCase();
            var browser = nav.startsWith('fr') ? 'fr' : nav.startsWith('ru') ? 'ru' : 'en';
            var lang    = params.get('lang') || stored || browser;
            if (lang !== 'fr' && lang !== 'en' && lang !== 'ru') lang = 'en';
            localStorage.setItem('cv-lang', lang);
            document.documentElement.lang = lang;
            window.cvInitLang = lang;

            var storedTheme = localStorage.getItem('cv-theme');
            var prefDark    = window.matchMedia('(prefers-color-scheme: dark)').matches;
            var theme       = storedTheme || (prefDark ? 'dark' : 'light');
            localStorage.setItem('cv-theme', theme);
            if (theme === 'dark') document.documentElement.classList.add('dark');
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        canvas:  'rgb(var(--canvas)  / <alpha-value>)',
                        surface: 'rgb(var(--surface) / <alpha-value>)',
                        border:  'rgb(var(--border)  / <alpha-value>)',
                        text:    'rgb(var(--text)    / <alpha-value>)',
                        muted:   'rgb(var(--muted)   / <alpha-value>)',
                        accent:  'rgb(var(--accent)  / <alpha-value>)',
                        green:   'rgb(var(--green)   / <alpha-value>)',
                        orange:  'rgb(var(--orange)  / <alpha-value>)',
                        red:     'rgb(var(--red)     / <alpha-value>)',
                        purple:  'rgb(var(--purple)  / <alpha-value>)',
                        pink:    'rgb(var(--pink)    / <alpha-value>)',
                        cyan:    'rgb(var(--cyan)    / <alpha-value>)',
                    }
                }
            }
        }
    </script>

    <style>
        /* ── Thème clair (défaut) ───────────────────────── */
        :root {
            --canvas:      246 248 250;
            --surface:     255 255 255;
            --border:      208 215 222;
            --text:        31 35 40;
            --muted:       101 109 118;
            --accent:      9 105 218;
            --green:       26 127 55;
            --orange:      154 103 0;
            --red:         207 34 46;
            --purple:      130 80 223;
            --pink:        191 57 137;
            --cyan:        27 124 131;
            --surface-alt: 240 244 248;
        }

        /* ── Thème sombre ───────────────────────────────── */
        html.dark {
            --canvas:      13 17 23;
            --surface:     22 27 34;
            --border:      48 54 61;
            --text:        230 237 243;
            --muted:       125 133 144;
            --accent:      88 166 255;
            --green:       63 185 80;
            --orange:      210 153 34;
            --red:         248 81 73;
            --purple:      188 140 255;
            --pink:        247 120 186;
            --cyan:        57 210 192;
            --surface-alt: 28 35 51;
        }

        [x-cloak] { display: none !important; }
        body { background: rgb(var(--canvas)); transition: background-color 0.2s; }
        .anim { opacity: 0; transform: translateY(14px); }

        .exp-row { transition: background 0.2s; }
        .exp-row:hover { background: rgb(var(--accent) / 0.04); }

        .proj-card { transition: border-color 0.2s, background 0.2s; }
        .proj-card:hover { border-color: rgb(var(--accent) / 0.25); background: rgb(var(--accent) / 0.05); }

        .cta {
            background: linear-gradient(135deg, rgb(var(--surface)) 0%, rgb(var(--surface-alt)) 100%);
            border: 1px solid rgb(var(--border));
            transition: all 0.3s ease;
        }
        .cta:hover {
            border-color: rgb(var(--accent) / 0.38);
            box-shadow: 0 4px 24px rgb(var(--accent) / 0.08);
            transform: translateY(-1px);
        }

        .lang-btn { transition: color 0.15s, border-color 0.15s; }

        .tech-svg svg { width: 100%; height: 100%; fill: currentColor; display: block; }

        .scroll-fade { scrollbar-width: none; }
        .scroll-fade::-webkit-scrollbar { display: none; }

        .proj-scroll-fade {
            background: linear-gradient(to bottom, transparent, rgb(var(--canvas)));
        }

        @keyframes scroll-bounce {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(4px); }
        }
        .scroll-hint-arrow { animation: scroll-bounce 1.2s ease-in-out infinite; }

    </style>
</head>
<body class="font-sans text-text antialiased">

    <div class="max-w-3xl lg:max-w-5xl mx-auto px-6 py-14 md:py-24">

        <header class="mb-10 anim" id="h1">
            <div class="flex items-start justify-between gap-4 mb-2">
                <h1 class="text-3xl md:text-4xl font-bold tracking-tight leading-tight">Papillon Virton</h1>

                <div class="flex items-center gap-1.5 shrink-0 pt-1">
                    <button @click="switchLang('fr')"
                            :class="lang === 'fr' ? 'text-accent border-accent/50' : 'text-muted border-border hover:text-text'"
                            class="lang-btn font-mono text-[10px] px-2 py-0.5 rounded border">
                        FR
                    </button>
                    <button @click="switchLang('en')"
                            :class="lang === 'en' ? 'text-accent border-accent/50' : 'text-muted border-border hover:text-text'"
                            class="lang-btn font-mono text-[10px] px-2 py-0.5 rounded border">
                        EN
                    </button>
                    <button @click="switchLang('ru')"
                            :class="lang === 'ru' ? 'text-accent border-accent/50' : 'text-muted border-border hover:text-text'"
                            class="lang-btn font-mono text-[10px] px-2 py-0.5 rounded border">
                        RU
                    </button>

                    <div class="h-3 w-px bg-border mx-0.5 shrink-0"></div>

                    <button @click="toggleTheme()" title="Changer de thème"
                            class="lang-btn px-1.5 py-0.5 rounded border border-border text-muted hover:text-text">
                        <!-- Soleil : visible en mode sombre -->
                        <svg class="w-3 h-3 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
                        </svg>
                        <!-- Lune : visible en mode clair -->
                        <svg class="w-3 h-3 dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
                        </svg>
                    </button>

                    <div class="h-3 w-px bg-border mx-0.5 shrink-0"></div>

                    <a :href="'pdf/cv-' + lang + '.pdf'"
                       :download="'cv-papillon-virton-' + lang + '.pdf'"
                       class="inline-flex items-center gap-1 font-mono text-[10px] px-2 py-0.5 rounded border border-accent/30 text-accent hover:bg-accent/10 transition-colors shrink-0">
                        <svg class="w-2.5 h-2.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                        </svg>
                        <span x-text="labels.downloadPdf || 'PDF'"></span>
                    </a>
                </div>
            </div>

            <div class="h-px bg-border mb-3"></div>
            <div class="flex flex-wrap gap-x-5 gap-y-1 font-mono text-sm text-muted">
                <a href="mailto:papillonvirton.pro@gmail.com" class="hover:text-accent transition-colors">papillonvirton.pro@gmail.com</a>
                <span x-text="labels.location"></span>
                <span x-text="age + ' ' + (labels.ageSuffix || 'ans')"></span>
            </div>
        </header>

        <div class="lg:grid lg:grid-cols-2 lg:gap-x-14">

        <section class="mb-10 anim" id="s1">
            <h2 class="font-mono text-xs tracking-[0.2em] uppercase text-muted mb-4" x-text="labels.sectionAbout"></h2>
            <p class="text-base text-muted leading-relaxed whitespace-pre-line" x-text="bio"></p>
        </section>

        <div>

        <section class="mb-10 anim" id="s0">
            <h2 class="font-mono text-xs tracking-[0.2em] uppercase text-muted mb-4" x-text="labels.sectionFormation"></h2>
            <div class="space-y-4">
                <template x-for="(f, i) in formation" :key="i">
                    <div class="flex flex-col sm:flex-row sm:gap-4 sm:items-start">
                        <span class="font-mono text-xs text-muted sm:w-28 sm:shrink-0 sm:pt-0.5 mb-1 sm:mb-0" x-text="f.date"></span>
                        <div class="flex-1">
                            <div class="flex items-center gap-2">
                                <p class="font-medium text-base flex-1" x-text="f.title"></p>
                                <span x-show="f.badge"
                                      class="font-mono text-xs px-1.5 py-px rounded-full shrink-0"
                                      :class="f.badgeCls"
                                      x-text="f.badge"></span>
                            </div>
                            <p class="text-sm text-muted mt-0.5" x-text="f.org"></p>
                        </div>
                    </div>
                </template>
            </div>
        </section>

        <section class="mb-10 anim" id="s1">
            <h2 class="font-mono text-xs tracking-[0.2em] uppercase text-muted mb-4">Technologies</h2>
            <div class="grid grid-flow-col auto-cols-fr gap-4">
                <template x-for="tech in technologies" :key="tech.name">
                    <span class="tech-svg aspect-square"
                          :title="tech.name"
                          :style="'color: ' + tech.color"
                          x-html="tech.svg"></span>
                </template>
            </div>
        </section>

        <section class="mb-10 anim" id="sc">
            <h2 class="font-mono text-xs tracking-[0.2em] uppercase text-muted mb-4" x-text="labels.sectionConcepts"></h2>
            <div class="grid grid-cols-3 gap-x-4 gap-y-5 items-start">
                <template x-for="group in concepts" :key="group.cat">
                    <div class="flex flex-col gap-2 items-start">
                        <span class="font-mono text-[11px] uppercase tracking-widest opacity-60 mb-0.5" :class="group.lc" x-text="group.cat"></span>
                        <template x-for="item in group.items" :key="item">
                            <span class="px-3 py-1 text-xs font-mono whitespace-nowrap"
                                  :class="group.tc"
                                  x-text="item"></span>
                        </template>
                    </div>
                </template>
            </div>
        </section>

        </div>

        <section class="mb-10 anim" id="s2">
            <h2 class="font-mono text-xs tracking-[0.2em] uppercase text-muted mb-4" x-text="labels.sectionExp"></h2>
            <div class="space-y-px rounded-lg border border-border overflow-hidden bg-surface" x-ref="expList">

                <template x-for="(e, i) in exps" :key="i">
                    <div class="exp-row px-4 py-3 cursor-pointer border-b border-border last:border-0"
                         @click="open = open === i ? null : i">
                        <div class="flex flex-col sm:flex-row sm:items-start sm:gap-4">
                            <span class="font-mono text-xs text-muted sm:w-28 sm:shrink-0 sm:pt-0.5 mb-1.5 sm:mb-0" x-text="e.date"></span>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2">
                                    <p class="font-medium text-base flex-1" x-text="e.title"></p>
                                    <span class="font-mono text-xs px-1.5 py-px rounded-full shrink-0"
                                          :class="e.badgeCls"
                                          x-text="e.badge"></span>
                                    <svg class="w-3.5 h-3.5 text-muted shrink-0 transition-transform duration-200"
                                         :class="open === i && 'rotate-180'"
                                         fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                                    </svg>
                                </div>
                                <div x-show="open === i" x-collapse x-cloak>
                                    <p class="text-sm text-muted mt-2 leading-relaxed whitespace-pre-line" x-text="e.desc"></p>
                                    <div x-show="e.tags && e.tags.length" class="flex flex-wrap gap-1.5 mt-2">
                                        <template x-for="tag in (e.tags || [])" :key="tag.t">
                                            <span class="px-1.5 py-px rounded text-xs font-mono border"
                                                  :class="tag.c"
                                                  x-text="tag.t"></span>
                                        </template>
                                    </div>
                                    <a x-show="e.url" :href="e.url" target="_blank" rel="noopener"
                                       class="inline-flex items-center gap-1 text-xs text-accent mt-2 hover:underline font-mono">
                                        <span x-text="e.linkText || labels.learnMore"></span>
                                        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>

            </div>
        </section>

        <section class="mb-10 anim" id="s3">
            <h2 class="font-mono text-xs tracking-[0.2em] uppercase text-muted mb-4" x-text="labels.sectionProjects"></h2>

            <a href="https://github.com/PowerPeps" target="_blank" class="cta rounded-lg p-3.5 mb-3 flex items-center gap-3.5 group block" x-ref="projCta">
                <svg class="w-7 h-7 text-muted group-hover:text-text shrink-0 transition-colors" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                <div class="flex-1 min-w-0">
                    <p class="font-medium text-base text-text" x-text="labels.githubHandle"></p>
                    <p class="text-xs text-muted mt-px" x-text="labels.githubDesc"></p>
                </div>
                <svg class="w-4 h-4 text-muted group-hover:text-accent group-hover:translate-x-0.5 shrink-0 transition-all" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            </a>

            <div class="relative">
            <div class="space-y-2 overflow-y-auto scroll-fade max-h-64"
                 x-ref="projScroll"
                 @scroll="projBottom = $el.scrollHeight - $el.scrollTop <= $el.clientHeight + 2">
                <template x-for="(p, i) in projects" :key="i">
                    <div class="proj-card border border-border rounded-lg px-4 py-3 cursor-pointer bg-surface"
                         @click="projOpen = projOpen === i ? null : i">
                        <div class="flex items-center justify-between gap-2">
                            <div class="flex items-center gap-2 flex-wrap min-w-0">
                                <p class="font-medium text-base text-accent" x-text="p.name"></p>
                                <span class="font-mono text-xs px-1.5 py-px rounded-full shrink-0"
                                      :class="p.badgeCls"
                                      x-text="p.badge"></span>
                            </div>
                            <svg class="w-3.5 h-3.5 text-muted shrink-0 transition-transform duration-200"
                                 :class="projOpen === i && 'rotate-180'"
                                 fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                            </svg>
                        </div>
                        <p class="text-xs text-muted mt-0.5" x-text="p.short"></p>
                        <div x-show="projOpen === i" x-collapse x-cloak>
                            <p class="text-sm text-muted mt-2 leading-relaxed" x-text="p.desc"></p>
                            <div x-show="p.tags && p.tags.length" class="flex flex-wrap gap-1.5 mt-2">
                                <template x-for="tag in (p.tags || [])" :key="tag.t">
                                    <span class="px-1.5 py-px rounded text-xs font-mono border"
                                          :class="tag.c"
                                          x-text="tag.t"></span>
                                </template>
                            </div>
                            <a x-show="p.url" :href="p.url" target="_blank" rel="noopener"
                               class="inline-flex items-center gap-1 text-xs text-accent mt-2 hover:underline font-mono">
                                <span x-text="labels.viewOnGithub"></span>
                                <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                            </a>
                        </div>
                    </div>
                </template>
            </div>
            <div class="proj-scroll-fade absolute bottom-0 left-0 right-0 h-16 pointer-events-none transition-opacity duration-300 flex items-end justify-center pb-1.5"
                 :class="projBottom ? 'opacity-0' : 'opacity-100'">
                <svg class="scroll-hint-arrow w-4 h-4 text-muted/60" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                </svg>
            </div>
            </div>
        </section>

        </div>

        <section class="mb-10 anim" id="s4">
            <h2 class="font-mono text-xs tracking-[0.2em] uppercase text-muted mb-4" x-text="labels.sectionPassions"></h2>
            <div class="flex flex-wrap gap-2">
                <template x-for="p in passions" :key="p.label">
                    <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-sm border border-border text-muted">
                        <i :data-lucide="p.icon"></i>
                        <span x-text="p.label"></span>
                    </span>
                </template>
            </div>
        </section>

        <div class="h-px bg-border anim" id="s5"></div>
        <p class="font-mono text-[10px] text-muted/40 mt-2.5 text-center anim" id="s6" x-text="labels.location"></p>

    </div>

    <script>
        function cvApp() {
            return {
                open:       null,
                projOpen:   null,
                projBottom: false,
                age:        0,
                lang:       window.cvInitLang || 'en',
                labels:     {},
                bio:        '',
                formation:    [],
                exps:         [],
                projects:     [],
                passions:     [],
                concepts:     [],
                technologies: [],

                async init() {
                    const load = src => new Promise((resolve, reject) => {
                        const s = document.createElement('script');
                        s.src = src; s.onload = resolve; s.onerror = reject;
                        document.head.appendChild(s);
                    });
                    await Promise.all([
                        load('data/statics.js'),
                        load('data/' + (window.cvInitLang || 'en') + '.js'),
                    ]);
                    const d  = window.cvLangData   || {};
                    const st = window.cvStaticData || {};
                    this.lang        = d.lang        || 'fr';
                    this.labels      = d.labels      || {};
                    this.bio         = d.bio         || '';
                    this.formation   = d.formation   || [];
                    this.exps        = d.exps        || [];
                    this.projects    = d.projects    || [];
                    this.passions    = d.passions    || [];
                    this.concepts    = d.concepts    || [];
                    this.technologies = st.technologies || [];

                    this.age = new Date(Date.now() - new Date(2003, 3, 22)).getUTCFullYear() - 1970;

                    this.$nextTick(() => {
                        if (typeof lucide !== 'undefined') {
                            lucide.createIcons({ attrs: { width: '14', height: '14', 'stroke-width': '1.75', class: 'shrink-0 inline-block' } });
                        }
                        const expEl  = this.$refs.expList;
                        const ctaEl  = this.$refs.projCta;
                        const projEl = this.$refs.projScroll;
                        if (expEl && ctaEl && projEl) {
                            const h = expEl.offsetHeight - ctaEl.offsetHeight - 12;
                            projEl.style.maxHeight = Math.max(h, 80) + 'px';
                        }
                        if (projEl) this.projBottom = projEl.scrollHeight <= projEl.clientHeight;
                        this._animate();
                    });
                },

                toggleTheme() {
                    const isDark = document.documentElement.classList.toggle('dark');
                    localStorage.setItem('cv-theme', isDark ? 'dark' : 'light');
                },

                switchLang(newLang) {
                    if (newLang === this.lang) return;
                    localStorage.setItem('cv-lang', newLang);
                    const url = new URL(window.location.href);
                    url.searchParams.set('lang', newLang);
                    window.location.href = url.toString();
                },

                _animate() {
                    const tl = gsap.timeline({ defaults: { ease: 'power2.out', duration: 0.5 } });
                    tl.to('#h1', { opacity: 1, y: 0 }, 0.10)
                      .to('#s1', { opacity: 1, y: 0 }, 0.18)
                      .to('#s0', { opacity: 1, y: 0 }, 0.26)
                      .to('#s1', { opacity: 1, y: 0 }, 0.32)
                      .to('#sc', { opacity: 1, y: 0 }, 0.36)
                      .to('#s2', { opacity: 1, y: 0 }, 0.42)
                      .to('#s3', { opacity: 1, y: 0 }, 0.46)
                      .to('#s4', { opacity: 1, y: 0 }, 0.54)
                      .to('#s5', { opacity: 1, y: 0 }, 0.60)
                      .to('#s6', { opacity: 1, y: 0 }, 0.64);
                },
            };
        }
    </script>
</body>
</html>
